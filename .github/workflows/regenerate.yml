# Place in: anomek/MyDalamudPlugins -> .github/workflows/regenerate.yml
name: Regenerate PluginMaster

on:
  workflow_dispatch:
  push:
    branches: [master]
    # IMPORTANT: only re-run on manifest changes, NOT on this job's own
    # pluginmaster.json / README.md commit -> avoids an infinite trigger loop
    # (download counts are live, so every run produces a diff).
    paths:
      - plugins/**
      - generate_pluginmaster.py
  # Optional: refresh live download counts daily even with no new release.
  schedule:
    - cron: '0 6 * * *'

concurrency: regenerate

jobs:
  generate:
    name: Regenerate PluginMaster
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate PluginMaster
        run: python generate_pluginmaster.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: EndBug/add-and-commit@v9
        with:
          add: --all
          author_name: GitHub Action
          author_email: github-actions[bot]@users.noreply.github.com
          message: Regenerate PluginMaster
